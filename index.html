<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title> Formulário | Doação de Sangue </title>
</head>
<body>
    <!-- o autoplay faz o vídeo iniciar sozinho; o muted tira o som (obrigatório para o autoplay); loop faz o vídeo recomeçar automaticamente ao chegar ao fim; 
     playsinline é um atributo de comportamento para vídeos, mantén o vídeo no fundo da página -->
    <video autoplay muted loop playsinline id="vid-fundo">
        <source src="assets/enha.video.mp4" type="video/mp4">        
    </video>

    <header>
        <h1> DADOS PARA DOAÇÃO DE SANGUE </h1>
    </header>

    <div class="form">
        <h2> Preencha seus dados com cuidado! </h2>

        <form id="formDoacao">
            <label for="nome"> Nome: </label>
            <input type="text" id="nome" placeholder="Insira seu nome completo">
            <br><br>
            <label for="email"> Email: </label>
            <input type="email" id="email" placeholder="Insira seu email">
            <br><br>
            <label for="idade"> Idade: </label>
            <input type="number" id="idade" placeholder="Insira sua idade">
            <br><br>
            <label for="peso"> Peso: </label>
            <input type="number" id="peso" placeholder="Insira seu peso">
            <br><br>
            <label for="sangue"> Tipo sanguíneo: </label>
            <select name="sangue" id="sangue">
                <option value=""> Selecione </option>
                <option value="A+"> A+ </option>
                <option value="A-"> A- </option>
                <option value="B+"> B+ </option>
                <option value="B-"> B- </option>
                <option value="AB+"> AB+ </option>
                <option value="AB-"> AB- </option>
                <option value="O+"> O+ </option>
                <option value="O-"> O- </option> 
            </select>
            <br><br>
            <label for="telefone"> Telefone: </label>
            <input type="text" id="telefone" placeholder="Insira seu número">
            <br><br>
            <label for="cidade"> Cidade: </label>
            <input type="text" id="cidade" placeholder="Insira sua cidade">
            <br><br>
            <label for="estado"> Estado: </label>
            <input type="text" id="estado" placeholder="Insira seu estado">
            <br><br>

            <button type="submit"> Enviar </button>
        </form>

        <div id="resultado"></div>
        
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
